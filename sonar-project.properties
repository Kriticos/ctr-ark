# Configuração do SonarQube para LaraSaaS
# ==========================================

# Informações do Projeto
sonar.projectKey=ctr-ark
sonar.projectName=ctr-ark
sonar.projectVersion=1.0.0
#sonar.organization=Kriticos

# Configurações de Source e Tests
sonar.sources=app,routes,config,database/migrations,database/seeders
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Exclusões (arquivos que não devem ser analisados)
sonar.exclusions=\
    **/vendor/**,\
    **/node_modules/**,\
    **/storage/**,\
    **/bootstrap/cache/**,\
    **/public/**,\
    **/*.blade.php,\
    **/resources/views/**,\
    **/resources/js/**,\
    **/resources/css/**

# Exclusões de Coverage
sonar.coverage.exclusions=\
    **/tests/**,\
    **/database/migrations/**,\
    **/database/seeders/**,\
    **/bootstrap/**,\
    **/config/**,\
    **/public/**,\
    **/*.blade.php

# Configuração do PHP
sonar.language=php
sonar.php.version=8.4

# Relatórios de Coverage (Pest gera em Clover XML)
sonar.php.coverage.reportPaths=coverage.xml

# Relatórios de Testes
sonar.php.tests.reportPath=tests/reports/junit.xml

# Importar relatórios externos (PHPStan)
# sonar.php.phpstan.reportPaths=phpstan-report.json

# Configurações de Qualidade
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignorar regras específicas do Blade
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.blade.php

# Ignorar complexidade em migrations
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/database/migrations/**

# Ignorar TODOs em tests
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**/tests/**

# Links do Projeto
sonar.links.homepage=https://github.com/Kriticos/ctr-ark
sonar.links.ci=https://github.com/Kriticos/ctr-ark/actions
sonar.links.issue=https://github.com/Kriticos/ctr-ark/issues
sonar.links.scm=https://github.com/Kriticos/ctr-ark
